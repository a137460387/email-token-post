<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>令牌取件系统</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📧</text></svg>">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="app-container">
        <!-- 顶部导航 -->
        <header class="header">
            <div class="header-left">
                <h1>📧 <span>令牌取件</span>系统</h1>
                <span class="subtitle">Microsoft Token Fetcher</span>
            </div>
            <div class="header-right">
                <button class="btn btn-primary" id="btnImport">
                    <span>+</span> 导入令牌
                </button>
            </div>
        </header>

        <!-- 主内容区 -->
        <div class="main-content">
            <!-- 左侧：分组管理 -->
            <aside class="sidebar" id="sidebar">
                <div class="sidebar-header">
                    <h2>分组管理</h2>
                </div>
                <div class="group-list" id="groupList"></div>
                <div class="sidebar-footer">
                    <button class="btn btn-ghost btn-sm" id="btnNewGroup" style="width:100%">
                        + 新建分组
                    </button>
                </div>
            </aside>

            <!-- 中间：账号列表 -->
            <section class="panel account-panel">
                <div class="panel-header">
                    <div class="panel-title">
                        <h2 id="currentGroupName">默认分组</h2>
                        <span class="account-count" id="accountCount">0</span>
                    </div>
                    <div class="toolbar">
                        <button class="btn btn-ghost btn-sm" id="btnSelectAll">全选</button>
                        <button class="btn btn-ghost btn-sm" id="btnMoveGroup">移动</button>
                        <button class="btn btn-danger btn-sm" id="btnDeleteSelected">删除</button>
                        <button class="btn btn-ghost btn-sm" id="btnExport">导出</button>
                        <button class="btn btn-ghost btn-sm" id="btnRawData">原数据</button>
                    </div>
                </div>
                <div class="account-list" id="accountList">
                    <div class="empty-state">暂无账号</div>
                </div>
            </section>

            <!-- 右侧：邮件区域 -->
            <section class="panel email-panel">
                <!-- 邮件列表 -->
                <div class="email-list-view" id="emailListView">
                    <div class="panel-header">
                        <h2 id="emailListTitle">邮件列表</h2>
                        <div class="toolbar">
                            <input type="text" id="emailSearchInput" class="search-input" placeholder="搜索邮件..." style="display:none">
                            <button class="btn btn-ghost btn-sm" id="btnSearchEmail" style="display:none">🔍</button>
                            <button class="btn btn-ghost btn-sm" id="btnRefreshEmails" style="display:none">刷新</button>
                            <button class="btn btn-ghost btn-sm" id="btnLatestEmail" style="display:none">最新</button>
                        </div>
                    </div>
                    <div class="email-list" id="emailList">
                        <div class="empty-state">选择账号查看邮件</div>
                    </div>
                </div>

                <!-- 邮件详情 -->
                <div class="email-detail-view" id="emailDetailView" style="display:none">
                    <div class="panel-header">
                        <button class="btn btn-ghost btn-sm" id="btnBackToList">← 返回</button>
                        <h2 id="emailDetailTitle">邮件详情</h2>
                    </div>
                    <div class="email-detail" id="emailDetail"></div>
                </div>
            </section>
        </div>
    </div>

    <!-- 弹窗：导入 -->
    <div class="modal-overlay" id="importModal">
        <div class="modal">
            <div class="modal-header">
                <h3>导入令牌账号</h3>
                <button class="btn-close" onclick="closeModal('importModal')">×</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>导入到分组</label>
                    <select id="importGroupSelect" class="form-select"></select>
                </div>
                <div class="form-group">
                    <label>账号数据</label>
                    <textarea id="importText" rows="8" placeholder="每行一个账号：&#10;email----password----client_id----refresh_token"></textarea>
                </div>
                <div class="form-group">
                    <label>或上传文件</label>
                    <input type="file" id="importFile" accept=".txt">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn" onclick="closeModal('importModal')">取消</button>
                <button class="btn btn-primary" id="btnConfirmImport">确认导入</button>
            </div>
        </div>
    </div>

    <!-- 弹窗：移动分组 -->
    <div class="modal-overlay" id="moveModal">
        <div class="modal modal-sm">
            <div class="modal-header">
                <h3>移动到分组</h3>
                <button class="btn-close" onclick="closeModal('moveModal')">×</button>
            </div>
            <div class="modal-body">
                <p class="move-count">已选中 <strong id="moveCount">0</strong> 个账号</p>
                <div class="form-group">
                    <label>目标分组</label>
                    <select id="moveGroupSelect" class="form-select"></select>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn" onclick="closeModal('moveModal')">取消</button>
                <button class="btn btn-primary" id="btnConfirmMove">确认移动</button>
            </div>
        </div>
    </div>

    <!-- 弹窗：导出 -->
    <div class="modal-overlay" id="exportModal">
        <div class="modal">
            <div class="modal-header">
                <h3 id="exportModalTitle">导出数据</h3>
                <button class="btn-close" onclick="closeModal('exportModal')">×</button>
            </div>
            <div class="modal-body">
                <textarea id="exportText" rows="10" readonly style="font-family:var(--font-mono);font-size:11px;"></textarea>
            </div>
            <div class="modal-footer">
                <button class="btn" onclick="closeModal('exportModal')">关闭</button>
                <button class="btn btn-primary" id="btnCopyExport">复制</button>
            </div>
        </div>
    </div>

    <!-- 弹窗：新建分组 -->
    <div class="modal-overlay" id="newGroupModal">
        <div class="modal modal-sm">
            <div class="modal-header">
                <h3>新建分组</h3>
                <button class="btn-close" onclick="closeModal('newGroupModal')">×</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>分组名称</label>
                    <input type="text" id="newGroupName" class="form-input" placeholder="输入分组名称">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn" onclick="closeModal('newGroupModal')">取消</button>
                <button class="btn btn-primary" id="btnConfirmNewGroup">创建</button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
