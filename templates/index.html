<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>令牌取件系统 - 微软令牌网页取件</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="app-container">
        <!-- 顶部标题栏 -->
        <header class="header">
            <div class="header-left">
                <h1>📧 令牌取件系统</h1>
                <span class="subtitle">微软令牌网页取件</span>
            </div>
            <div class="header-right">
                <button class="btn btn-primary" id="btnImport">📥 导入令牌账号</button>
            </div>
        </header>

        <!-- 主内容区：三栏布局 -->
        <div class="main-content">
            <!-- 左侧：分组管理 -->
            <div class="sidebar" id="sidebar">
                <div class="sidebar-header">
                    <h2>令牌库分组管理</h2>
                </div>
                <div class="group-list" id="groupList">
                    <!-- 分组列表动态生成 -->
                </div>
                <div class="sidebar-footer">
                    <button class="btn btn-sm btn-block" id="btnNewGroup">+ 新建分组</button>
                </div>
            </div>

            <!-- 中间：账号列表 -->
            <div class="panel account-panel">
                <div class="panel-header">
                    <div class="panel-title">
                        <h2 id="currentGroupName">默认分组</h2>
                        <span class="account-count" id="accountCount">0 个账号</span>
                    </div>
                    <div class="toolbar">
                        <button class="btn btn-sm" id="btnSelectAll">全选</button>
                        <button class="btn btn-sm" id="btnMoveGroup">📦 移动分组</button>
                        <button class="btn btn-sm btn-danger" id="btnDeleteSelected">🗑 删除勾选</button>
                        <button class="btn btn-sm" id="btnExport">📤 导出账密</button>
                        <button class="btn btn-sm" id="btnRawData">📋 原数据</button>
                    </div>
                </div>
                <div class="account-list" id="accountList">
                    <div class="empty-state">暂无账号，请导入</div>
                </div>
            </div>

            <!-- 右侧：邮件区域 -->
            <div class="panel email-panel">
                <div class="email-view" id="emailView">
                    <!-- 邮件列表视图 -->
                    <div class="email-list-view" id="emailListView">
                        <div class="panel-header">
                            <h2 id="emailListTitle">邮件列表</h2>
                            <div class="toolbar">
                                <button class="btn btn-sm btn-primary" id="btnRefreshEmails" style="display:none">🔄 刷新</button>
                                <button class="btn btn-sm" id="btnLatestEmail" style="display:none">📬 最新邮件</button>
                            </div>
                        </div>
                        <div class="email-list" id="emailList">
                            <div class="empty-state">请在中间列表选择账号查看邮件</div>
                        </div>
                    </div>

                    <!-- 邮件详情视图 -->
                    <div class="email-detail-view" id="emailDetailView" style="display:none">
                        <div class="panel-header">
                            <button class="btn btn-sm" id="btnBackToList">← 返回列表</button>
                            <h2 id="emailDetailTitle">邮件详情</h2>
                        </div>
                        <div class="email-detail" id="emailDetail">
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 导入弹窗 -->
    <div class="modal-overlay" id="importModal">
        <div class="modal">
            <div class="modal-header">
                <h3>📥 导入令牌账号</h3>
                <button class="btn-close" onclick="closeModal('importModal')">×</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>导入到：</label>
                    <select id="importGroupSelect" class="form-select">
                        <!-- 动态生成 -->
                    </select>
                </div>
                <div class="form-group">
                    <label>格式：email----password----client_id----refresh_token</label>
                    <textarea id="importText" rows="8" placeholder="每行一个账号&#10;email----password----client_id----refresh_token"></textarea>
                </div>
                <div class="form-group">
                    <label>或上传TXT文件：</label>
                    <input type="file" id="importFile" accept=".txt">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-primary" id="btnConfirmImport">确认导入</button>
                <button class="btn" onclick="closeModal('importModal')">取消</button>
            </div>
        </div>
    </div>

    <!-- 移动分组弹窗 -->
    <div class="modal-overlay" id="moveModal">
        <div class="modal">
            <div class="modal-header">
                <h3>📦 移动分组</h3>
                <button class="btn-close" onclick="closeModal('moveModal')">×</button>
            </div>
            <div class="modal-body">
                <p class="move-count">已选择 <strong id="moveCount">0</strong> 个账号</p>
                <div class="form-group">
                    <label>目标分组：</label>
                    <select id="moveGroupSelect" class="form-select">
                        <!-- 动态生成 -->
                    </select>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-primary" id="btnConfirmMove">确认移动</button>
                <button class="btn" onclick="closeModal('moveModal')">取消</button>
            </div>
        </div>
    </div>

    <!-- 导出弹窗 -->
    <div class="modal-overlay" id="exportModal">
        <div class="modal">
            <div class="modal-header">
                <h3 id="exportModalTitle">📤 导出数据</h3>
                <button class="btn-close" onclick="closeModal('exportModal')">×</button>
            </div>
            <div class="modal-body">
                <textarea id="exportText" rows="10" readonly></textarea>
            </div>
            <div class="modal-footer">
                <button class="btn btn-primary" id="btnCopyExport">📋 复制</button>
                <button class="btn" onclick="closeModal('exportModal')">关闭</button>
            </div>
        </div>
    </div>

    <!-- 新建分组弹窗 -->
    <div class="modal-overlay" id="newGroupModal">
        <div class="modal modal-sm">
            <div class="modal-header">
                <h3>新建分组</h3>
                <button class="btn-close" onclick="closeModal('newGroupModal')">×</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>分组名称：</label>
                    <input type="text" id="newGroupName" class="form-input" placeholder="输入分组名称">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-primary" id="btnConfirmNewGroup">创建</button>
                <button class="btn" onclick="closeModal('newGroupModal')">取消</button>
            </div>
        </div>
    </div>

    <!-- 提示框 -->
    <div class="toast" id="toast"></div>

    <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
